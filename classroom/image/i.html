```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Amazon Clone with Cart & Login</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">

<style>
*{margin:0; padding:0; box-sizing:border-box; font-family:'Roboto',Arial,sans-serif;}
body{background:#f2f2f2;}
a{text-decoration:none; color:white;}

/* Navbar */
.navbar{display:flex; align-items:center; gap:10px; padding:8px 12px; background:#0f1111; color:white; position:relative;}
.nav-border{border:1px solid transparent; padding:5px 8px;}
.nav-border:hover{border:1px solid white; border-radius:2px;}
.nav-logo{width:160px; height:50px;}
.logo{width:100%; height:100%; background:url("amazon_logo.png") no-repeat center/contain;}
.delivery{position:relative;}
.line1{font-size:12px; color:#ccc;}
.line2-row{display:flex; gap:5px; align-items:center;}
.line2{font-size:14px; font-weight:700;}
.search-wrapper{flex:1; max-width:650px; border:2px solid transparent; border-radius:4px;}
.search-wrapper:hover{border:2px solid #f3a847;}
.search-bar{display:flex;}
.search-bar select{padding:9px; border:none; background:#e6e6e6;}
.search-bar input{width:100%; padding:9px; border:none; outline:none;}
.search-bar button{padding:9px 14px; border:none; background:#febd69; cursor:pointer;}
.sign-in,.orders{padding:5px 10px; position:relative;}
.sign-in span,.orders span{font-size:12px; color:#ccc;}
.account,.and-orders{font-weight:700;}
.cart{display:flex; align-items:center; gap:5px; font-weight:700; padding:6px 10px; cursor:pointer;}
.cart i{font-size:22px;}

/* HERO SLIDER */
.hero-section{
height:350px;
position:relative;
overflow:hidden;
margin-bottom:20px;
}

.hero-slide{
width:100%;
height:100%;
object-fit:cover;
position:absolute;
top:0;
left:0;
opacity:0;
transition:opacity 1s ease-in-out;
}

.hero-slide.active{
opacity:1;
}

/* Shop */
.shop-section{display:flex; flex-wrap:wrap; justify-content:space-evenly; gap:20px; padding:20px; background:#e3e6e6;}
.box{width:23%; background:white; padding:15px; border-radius:4px; transition: transform 0.2s; position: relative;}
.box:hover{transform: scale(1.03);}
.box img{width:100%; height:200px; object-fit:cover; border-radius:4px;}
.box h2{font-size:18px; margin-bottom:10px;}
.box button{border:none; background:#febd69; padding:8px 12px; border-radius:4px; font-weight:700; cursor:pointer;}
.box button:hover{background:#f08804; color:white;}

/* Cart Panel */
.cart-panel{position:fixed; top:70px; right:10px; width:300px; max-height:80vh; background:white; border:1px solid #ccc; padding:10px; overflow-y:auto; box-shadow: 0 5px 10px rgba(0,0,0,0.2); border-radius:4px; display:none;}
.cart-item{display:flex; justify-content:space-between; align-items:center; margin-bottom:8px;}
.cart-item img{width:50px; height:50px; object-fit:cover; border-radius:4px;}
.cart-item button{background:red; color:white; border:none; padding:4px 8px; border-radius:4px; cursor:pointer;}

/* Media */
@media(max-width:768px){
  .navbar{flex-direction:column; text-align:center;}
  .shop-section{flex-direction:column; align-items:center;}
  .box{width:90%;}
}
</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
<a class="nav-logo nav-border"><div class="logo"></div></a>
<a class="cart nav-border" id="cart-btn"><i class="fa-solid fa-cart-shopping"></i> Cart</a>
</div>

<!-- HERO SLIDER -->
<div class="hero-section">
<img src="hero1.jpg" class="hero-slide active">
<img src="hero2.jpg" class="hero-slide">
<img src="hero3.jpg" class="hero-slide">
<img src="hero4.jpg" class="hero-slide">
<img src="hero5.jpg" class="hero-slide">
</div>

<!-- Shop -->
<div class="shop-section" id="shop"></div>

<!-- Cart -->
<div class="cart-panel" id="cart-panel">
<h3>Your Cart</h3>
<div id="cart-items"></div>
<p>Total: ₹<span id="cart-total">0</span></p>
</div>

<script>

// PRODUCTS
let productsDB=[
{id:1,name:"Clothing",image:"box1_image.jpg",price:500},
{id:2,name:"Health Care",image:"box2_image.jpg",price:300},
{id:3,name:"Furniture",image:"box3_image.jpg",price:1500},
{id:4,name:"Electronics",image:"box4_image.jpg",price:2000},
{id:5,name:"Beauty",image:"box5_image.jpg",price:400},
{id:6,name:"Pet Care",image:"box6_image.jpg",price:350},
{id:7,name:"Home Decor",image:"box7_image.jpg",price:700},
{id:8,name:"Kitchen",image:"box8_image.jpg",price:250}
];

let cart=[];

const shop=document.getElementById("shop");
const cartPanel=document.getElementById("cart-panel");
const cartItems=document.getElementById("cart-items");
const cartTotal=document.getElementById("cart-total");

// RENDER SHOP
function renderShop(){
shop.innerHTML='';
productsDB.forEach(p=>{
const box=document.createElement("div");
box.className="box";
box.innerHTML=`
<h2>${p.name}</h2>
<img src="${p.image}">
<p>₹${p.price}</p>
<button onclick="addToCart(${p.id})">Add to Cart</button>
`;
shop.appendChild(box);
});
}

// CART
function renderCart(){
cartItems.innerHTML='';
let total=0;

cart.forEach((item,i)=>{
total+=item.price;

const div=document.createElement("div");
div.className="cart-item";

div.innerHTML=`
<img src="${item.image}">
<span>${item.name} ₹${item.price}</span>
<button onclick="removeCart(${i})">X</button>
`;

cartItems.appendChild(div);
});

cartTotal.textContent=total;
}

function addToCart(id){
const product=productsDB.find(p=>p.id===id);
cart.push(product);
renderCart();
}

function removeCart(i){
cart.splice(i,1);
renderCart();
}

document.getElementById("cart-btn").onclick=()=>{
cartPanel.style.display=
cartPanel.style.display==="block"?"none":"block";
};

// HERO SLIDER
let heroSlides=document.querySelectorAll(".hero-slide");
let heroIndex=0;

function showHeroSlide(){

heroSlides.forEach(s=>s.classList.remove("active"));

heroIndex++;

if(heroIndex>=heroSlides.length){
heroIndex=0;
}

heroSlides[heroIndex].classList.add("active");

}

setInterval(showHeroSlide,3000);

// INIT
renderShop();

</script>

</body>
</html>
```
